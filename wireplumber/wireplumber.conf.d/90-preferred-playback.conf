# Register the Lua file as a WirePlumber component. Requiring
# policy.default-nodes ensures the standard default-selection machinery exists.
wireplumber.components = [
    {
        name = preferred-playback.lua
        type = script/lua
        provides = custom.preferred-playback
        requires = [ policy.default-nodes ]
    }
]

# Require the component in the main desktop profile so it loads at startup.
wireplumber.profiles = {
    main = {
        custom.preferred-playback = required
    }
}
